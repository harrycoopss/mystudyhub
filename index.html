<!DOCTYPE html>
<html>
<head>
  <title>Study Hub App v3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      color: #1f2937;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 45%, #eef2f7 100%);
    }
    header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      padding: 22px 15px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(30, 58, 138, 0.25);
    }
    .container { padding:20px 15px; max-width:900px; margin:auto; }

    input, textarea {
      width: 100%;
      padding: 11px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .card {
      background: white;
      padding: 16px;
      margin-bottom: 15px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }

    .topic { display:flex; justify-content:space-between; align-items:center; margin:7px 0; }
    .topic a { color:#1d4ed8; text-decoration:none; font-weight:600; }
    .topic a:hover { text-decoration:underline; }

    button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 9px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, transform 0.2s;
    }
    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .star { cursor:pointer; font-size:18px; }

    .flashcard {
      background: linear-gradient(135deg, #f8fafc, #eef2ff);
      border: 1px solid #dbeafe;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    @media(max-width:600px){ h1{font-size:20px;} }
  </style>
</head>
<body>

<header>
  <h1>📚 Study Hub</h1>
</header>

<div class="container">

<input type="text" id="search" placeholder="Search..." onkeyup="search()">

<div class="card">
  <h3>⭐ Important Topics</h3>
  <div id="importantList"></div>
</div>

<div class="card">
  <h3>Maths</h3>
  <div class="topic"><a href="#">Algebra Notes</a> <span class="star" onclick="toggleStar('Algebra Notes')">⭐</span></div>
  <div class="topic"><a href="#">Calculus Flashcards</a> <span class="star" onclick="toggleStar('Calculus Flashcards')">⭐</span></div>
</div>

<div class="card">
  <h3>History</h3>
  <div class="topic"><a href="#">Cold War Summary</a> <span class="star" onclick="toggleStar('Cold War Summary')">⭐</span></div>
</div>

<div class="card">
  <h3>Philosophy</h3>
  <div class="topic"><a href="#">Utilitarianism Notes</a> <span class="star" onclick="toggleStar('Utilitarianism Notes')">⭐</span></div>
</div>

<!-- Flashcards Viewer -->
<div class="card">
  <h3>🧠 Flashcards</h3>
  <div class="flashcard" onclick="flipCard()" id="card">Click to start</div>
</div>

<!-- Create Flashcards -->
<div class="card">
  <h3>➕ Create Flashcard</h3>
  <textarea id="question" placeholder="Enter question"></textarea>
  <textarea id="answer" placeholder="Enter answer"></textarea>
  <button onclick="addFlashcard()">Add Flashcard</button>
</div>

</div>

<script>
let starred = JSON.parse(localStorage.getItem('stars')) || [];
let flashcards = JSON.parse(localStorage.getItem('flashcards')) || [
  {q:"What is utilitarianism?", a:"Maximise happiness"}
];

let index=0, showingQ=true;

function toggleStar(name){
  if(starred.includes(name)){
    starred = starred.filter(x=>x!==name);
  } else {
    starred.push(name);
  }
  localStorage.setItem('stars', JSON.stringify(starred));
  renderImportant();
}

function renderImportant(){
  let list=document.getElementById('importantList');
  list.innerHTML='';
  starred.forEach(item=>{
    let div=document.createElement('div');
    div.textContent=item;
    list.appendChild(div);
  });
}

function search(){
  let val=document.getElementById('search').value.toLowerCase();
  let topics=document.querySelectorAll('.topic');
  topics.forEach(t=>{
    let text=t.innerText.toLowerCase();
    t.style.display = text.includes(val)?'flex':'none';
  });
}

function flipCard(){
  let card=document.getElementById('card');
  if(flashcards.length===0){
    card.textContent="No flashcards yet";
    return;
  }

  if(showingQ){
    card.textContent=flashcards[index].q;
  } else {
    card.textContent=flashcards[index].a;
    index=(index+1)%flashcards.length;
  }
  showingQ=!showingQ;
}

function addFlashcard(){
  let q=document.getElementById('question').value;
  let a=document.getElementById('answer').value;

  if(!q || !a) return;

  flashcards.push({q:q, a:a});
  localStorage.setItem('flashcards', JSON.stringify(flashcards));

  document.getElementById('question').value='';
  document.getElementById('answer').value='';

  alert('Flashcard added');
}

renderImportant();
</script>

</body>
</html>
